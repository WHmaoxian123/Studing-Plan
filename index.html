<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学习计划</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #8b5cf6;
            --primary-dark: #7c3aed;
            --primary-light: #a78bfa;
            --secondary: #c084fc;
            --accent: #f472b6;
            --success: #10b981;
            --success-light: rgba(16, 185, 129, 0.15);
            --warning: #f59e0b;
            --warning-light: rgba(245, 158, 11, 0.15);
            --danger: #ef4444;
            --danger-light: rgba(239, 68, 68, 0.15);
            --bg-dark: #0a0a0f;
            --bg-card: #12121a;
            --bg-card-hover: #1a1a25;
            --bg-card-active: #22222f;
            --bg-input: #0f0f15;
            --text-primary: #f4f4f5;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            --border: #27272a;
            --border-light: #3f3f46;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --shadow-glow: 0 0 40px rgba(139, 92, 246, 0.15);
            --radius: 16px;
            --radius-sm: 10px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-dark);
            min-height: 100vh;
            color: var(--text-primary);
            line-height: 1.6;
            padding: 0;
            margin: 0;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(139, 92, 246, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(192, 132, 252, 0.06) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .container {
            max-width: 100%;
            padding: 20px;
            max-height: 100vh;
            overflow-y: auto;
        }

        .container::-webkit-scrollbar {
            width: 6px;
        }

        .container::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }

        .container::-webkit-scrollbar-thumb {
            background: var(--border-light);
            border-radius: 3px;
        }

        .container::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 50%, var(--primary-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .progress-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
        }

        /* 全局周期看板 */
        .global-period-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
        }

        .global-period-header {
            display: none;
        }

        .global-period-edit-btn {
            font-size: 0.75rem;
            color: var(--primary);
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .global-period-edit-btn:hover {
            background: rgba(139, 92, 246, 0.1);
        }

        .global-period-content {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .global-period-row {
            display: flex;
            align-items: center;
        }

        .global-period-row-top {
            justify-content: space-between;
            align-items: center;
        }

        .global-period-row-bottom {
            justify-content: flex-start;
            gap: 12px;
        }

        .global-period-dates {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
            color: var(--text-primary);
        }

        .global-period-date {
            font-weight: 600;
        }

        .global-period-separator {
            color: var(--text-muted);
        }

        .global-period-dates-text {
            white-space: nowrap;
        }

        .global-countdown {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .global-countdown.normal {
            background: var(--success-light);
            color: var(--success);
        }

        .global-countdown.warning {
            background: var(--warning-light);
            color: var(--warning);
        }

        .global-countdown.overdue {
            background: var(--danger-light);
            color: var(--danger);
        }

        .global-period-form {
            display: none;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .global-period-form.active {
            display: block;
        }

        .global-period-form-row {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .global-period-form-group {
            flex: 1;
            min-width: 120px;
        }

        .global-period-form-group label {
            display: block;
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .global-period-form-group input {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 0.85rem;
        }

        .global-period-form-group input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .global-period-form-actions {
            display: flex;
            gap: 8px;
        }

        .global-period-form-actions .btn {
            padding: 10px 16px;
            font-size: 0.8rem;
        }

        .global-period-empty {
            text-align: center;
            padding: 8px;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .mt-4 {
            margin-top: 16px;
        }

        /* 难度徽章 */
        .difficulty-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
        }

        .difficulty-badge:hover {
            transform: scale(1.05);
        }

        .difficulty-badge:active {
            transform: scale(0.95);
        }

        .difficulty-level-1 {
            background: rgba(75, 85, 99, 0.4);
            color: #9ca3af;
        }

        .difficulty-level-2 {
            background: rgba(30, 58, 138, 0.5);
            color: #60a5fa;
        }

        .difficulty-level-3 {
            background: rgba(19, 78, 74, 0.5);
            color: #2dd4bf;
        }

        .difficulty-level-4 {
            background: rgba(134, 25, 143, 0.5);
            color: #e879f9;
        }

        .difficulty-level-5 {
            background: rgba(136, 46, 56, 0.5);
            color: #fb7185;
        }

        .difficulty-empty {
            background: rgba(139, 92, 246, 0.15);
            color: var(--primary-light);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: default;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .progress-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .progress-stats {
            font-size: 1rem;
            font-weight: 700;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .progress-track {
            height: 8px;
            background: var(--bg-input);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            border-radius: 4px;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .form-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
            overflow: hidden;
            max-height: 1000px;
            opacity: 1;
            transform: translateY(0);
            transition: all 0.3s ease;
        }

        .form-section.hidden {
            max-height: 0;
            opacity: 0;
            transform: translateY(-10px);
            padding-top: 0;
            padding-bottom: 0;
            margin-bottom: 0;
            border-width: 0;
        }

        .btn-new-task {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            margin-bottom: 20px;
        }

        .form-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-title::before {
            content: '';
            width: 4px;
            height: 18px;
            background: linear-gradient(180deg, var(--primary), var(--accent));
            border-radius: 2px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 14px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .form-group label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 6px;
            font-weight: 500;
        }

        .form-group input {
            padding: 12px 14px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 0.85rem;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.15);
        }

        .form-group input::placeholder {
            color: var(--text-muted);
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.3);
        }

        .btn-secondary {
            background: var(--bg-card-hover);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--bg-card-active);
            border-color: var(--primary);
        }

        .task-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .task-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all 0.3s;
        }

        .task-card:hover {
            border-color: var(--border-light);
        }

        .task-card.active {
            border-color: var(--primary);
            box-shadow: var(--shadow), 0 0 25px rgba(139, 92, 246, 0.12);
        }

        .task-card.active::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
        }

        .task-card {
            position: relative;
        }

        .task-header {
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            cursor: pointer;
        }

        .task-main {
            flex: 1;
            min-width: 0;
        }

        .task-name {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .task-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            font-size: 0.8rem;
        }

        .task-period {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .task-date-range {
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .task-duration {
            background: rgba(139, 92, 246, 0.15);
            color: var(--primary-light);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 3px;
        }

        .task-countdown {
            padding: 3px 8px;
            border-radius: 16px;
            font-weight: 500;
            font-size: 0.75rem;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .task-countdown.normal {
            background: var(--success-light);
            color: var(--success);
        }

        .task-countdown.warning {
            background: var(--warning-light);
            color: var(--warning);
        }

        .task-countdown.overdue {
            background: var(--danger-light);
            color: var(--danger);
        }

        .task-progress-section {
            margin-top: 10px;
        }

        .task-progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .task-progress-bar {
            height: 5px;
            background: var(--bg-input);
            border-radius: 3px;
            overflow: hidden;
        }

        .task-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--success), #34d399);
            border-radius: 3px;
            transition: width 0.4s ease;
        }

        .task-actions {
            display: flex;
            gap: 6px;
        }

        .task-action-btn {
            width: 32px;
            height: 32px;
            border-radius: 7px;
            border: 1px solid var(--border);
            background: var(--bg-input);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            flex-shrink: 0;
        }

        .task-action-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .task-action-btn.delete:hover {
            border-color: var(--danger);
            color: var(--danger);
        }

        .task-action-btn svg {
            width: 16px;
            height: 16px;
        }

        .expand-icon {
            transition: transform 0.3s;
        }

        .task-card.expanded .expand-icon {
            transform: rotate(180deg);
        }

        .subtask-section {
            border-top: 1px solid var(--border);
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
        }

        .task-card.expanded .subtask-section {
            max-height: 600px;
        }

        .subtask-content {
            padding: 16px;
            background: var(--bg-input);
        }

        .subtask-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .subtask-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            transition: all 0.3s;
        }

        .subtask-item:hover {
            border-color: var(--border-light);
        }

        .subtask-status {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 12px;
            flex-shrink: 0;
        }

        .subtask-status.pending {
            color: var(--text-muted);
        }

        .subtask-status.complete {
            background: var(--success);
            border-color: var(--success);
            color: white;
        }

        .subtask-status.skipped {
            background: var(--warning);
            border-color: var(--warning);
            color: white;
        }

        .subtask-name {
            flex: 1;
            font-size: 0.85rem;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .subtask-item.skipped .subtask-name {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .subtask-item.complete .subtask-name {
            color: var(--success);
        }

        .subtask-delete {
            width: 24px;
            height: 24px;
            border-radius: 5px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            opacity: 0;
        }

        .subtask-item:hover .subtask-delete {
            opacity: 1;
        }

        .subtask-delete:hover {
            background: var(--danger-light);
            color: var(--danger);
        }

        .subtask-delete svg {
            width: 14px;
            height: 14px;
        }

        .add-subtask {
            margin-top: 10px;
        }

        .add-subtask-row {
            display: flex;
            gap: 6px;
        }

        .add-subtask-row input {
            flex: 1;
            padding: 10px 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 0.85rem;
        }

        .add-subtask-row input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .add-subtask-row .btn {
            padding: 10px 16px;
        }

        .empty-state {
            text-align: center;
            padding: 50px 20px;
            background: var(--bg-card);
            border: 1px dashed var(--border);
            border-radius: var(--radius);
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            color: var(--text-muted);
            margin-bottom: 16px;
        }

        .empty-state h3 {
            font-size: 1rem;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .empty-state p {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        /* 顶部导航按钮 */
        .header-nav {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .nav-btn {
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--bg-card);
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .nav-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .nav-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-color: transparent;
            color: white;
        }

        .nav-btn svg {
            width: 16px;
            height: 16px;
        }

        /* 归档按钮 - 低调样式 */
        .btn-archive {
            display: block;
            width: 100%;
            padding: 16px;
            margin-top: 24px;
            margin-bottom: 8px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 0.8rem;
            cursor: pointer;
            text-align: center;
            transition: color 0.3s;
        }

        .btn-archive:hover {
            color: var(--text-secondary);
        }

        /* 历史记录卡片 */
        .history-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            margin-bottom: 16px;
        }

        .history-header {
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .history-info {
            flex: 1;
        }

        .history-date {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .history-stats {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .history-stats span {
            margin-right: 12px;
        }

        .history-actions {
            display: flex;
            gap: 8px;
        }

        .history-detail {
            border-top: 1px solid var(--border);
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
            background: var(--bg-input);
        }

        .history-card.expanded .history-detail {
            max-height: 2000px;
        }

        .history-detail-content {
            padding: 16px;
        }

        .history-task-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 12px;
            margin-bottom: 10px;
        }

        .history-task-name {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .history-task-date {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .history-subtask-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .history-subtask-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            background: var(--bg-input);
            border-radius: 6px;
            font-size: 0.8rem;
        }

        .history-subtask-status {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            flex-shrink: 0;
        }

        .history-subtask-status.pending {
            border: 2px solid var(--border-light);
            color: var(--text-muted);
        }

        .history-subtask-status.complete {
            background: var(--success);
            color: white;
        }

        .history-subtask-status.skipped {
            background: var(--warning);
            color: white;
        }

        .history-subtask-name {
            color: var(--text-secondary);
        }

        .history-subtask-name.complete {
            color: var(--success);
        }

        .history-subtask-name.skipped {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        /* 页面切换 */
        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        /* 自定义 Modal 弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-box {
            background: linear-gradient(145deg, #1e1e2e, #181825);
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 16px;
            padding: 24px;
            max-width: 340px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 40px rgba(139, 92, 246, 0.1);
            transform: scale(0.9);
            transition: transform 0.2s ease;
        }

        .modal-overlay.active .modal-box {
            transform: scale(1);
        }

        .modal-icon {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 12px;
        }

        .modal-title {
            text-align: center;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .modal-message {
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .modal-btn {
            padding: 10px 24px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
        }

        .modal-btn-cancel {
            background: transparent;
            color: var(--text-muted);
        }

        .modal-btn-cancel:hover {
            color: var(--text-secondary);
            background: rgba(255, 255, 255, 0.05);
        }

        .modal-btn-confirm {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }

        .modal-btn-confirm:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
        }

        /* Toast 提示 */
        .toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: linear-gradient(145deg, #1e1e2e, #181825);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 12px;
            padding: 14px 24px;
            color: var(--success);
            font-size: 0.9rem;
            font-weight: 500;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            z-index: 1001;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .toast.active {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 480px) {
            .container {
                padding: 15px;
            }

            h1 {
                font-size: 1.5rem;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .task-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .task-actions {
                width: 100%;
                justify-content: flex-end;
            }

            .task-meta {
                flex-direction: column;
                gap: 6px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>学习计划</h1>
            <p class="subtitle" id="motivational-quote">目标明确，步步为营</p>
        </header>

        <div class="header-nav">
            <button class="nav-btn active" id="navMain" onclick="switchPage('main')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                主页
            </button>
            <button class="nav-btn" id="navHistory" onclick="switchPage('history')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polyline points="12 6 12 12 16 14"></polyline>
                </svg>
                历史记录
            </button>
        </div>

        <!-- 主页 -->
        <div class="page active" id="mainPage">
            <!-- 全局周期看板 -->
            <div class="global-period-section">
                <div id="globalPeriodContent">
                    <div class="global-period-empty">点击"设置"定义你的学习周期</div>
                </div>
                <div class="global-period-form" id="globalPeriodForm">
                    <div class="global-period-form-row">
                        <div class="global-period-form-group">
                            <label>开始日期</label>
                            <input type="date" id="globalStartDate">
                        </div>
                        <div class="global-period-form-group">
                            <label>结束日期</label>
                            <input type="date" id="globalEndDate">
                        </div>
                        <div class="global-period-form-actions">
                            <button class="btn btn-secondary" onclick="cancelGlobalPeriod()">取消</button>
                            <button class="btn btn-primary" onclick="saveGlobalPeriod()">保存</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="progress-section">
                <div class="progress-header">
                    <span class="progress-label">总体进度</span>
                    <span class="progress-stats" id="totalProgress">0 / 0</span>
                </div>
                <div class="progress-track">
                    <div class="progress-fill" id="totalProgressBar" style="width: 0%"></div>
                </div>
            </div>

            <button class="btn btn-primary btn-new-task" onclick="toggleForm()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                新建任务
            </button>

            <div class="form-section" id="taskForm">
                <h2 class="form-title">添加大任务</h2>
                <div class="form-group full-width">
                    <label>任务名称</label>
                    <input type="text" id="taskName" placeholder="例如：完成前端开发课程">
                </div>
                <button class="btn btn-primary mt-4" onclick="addTask()">
                    创建任务
                </button>
            </div>

            <div id="taskList"></div>

            <button class="btn btn-archive" onclick="archiveTasks()">
                任务终了
            </button>
        </div>

        <!-- 历史记录页面 -->
        <div class="page" id="historyPage">
            <div id="historyList"></div>
        </div>
    </div>

    <!-- 自定义 Modal 弹窗 -->
    <div class="modal-overlay" id="archiveModal">
        <div class="modal-box">
            <div class="modal-icon">📦</div>
            <div class="modal-title">归档确认</div>
            <div class="modal-message">确定要归档当前所有任务吗？<br>归档后将清空任务列表，开启新周期。</div>
            <div class="modal-actions">
                <button class="modal-btn modal-btn-cancel" onclick="closeModal()">取消</button>
                <button class="modal-btn modal-btn-confirm" onclick="confirmArchive()">确定归档</button>
            </div>
        </div>
    </div>

    <!-- Toast 提示 -->
    <div class="toast" id="toast"></div>

    <script>
        const STORAGE_KEY = 'study_plans_tauri';
        const HISTORY_KEY = 'study_plans_history';

        // 页面切换
        function switchPage(page) {
            const mainPage = document.getElementById('mainPage');
            const historyPage = document.getElementById('historyPage');
            const navMain = document.getElementById('navMain');
            const navHistory = document.getElementById('navHistory');

            if (page === 'main') {
                mainPage.classList.add('active');
                historyPage.classList.remove('active');
                navMain.classList.add('active');
                navHistory.classList.remove('active');
            } else {
                mainPage.classList.remove('active');
                historyPage.classList.add('active');
                navMain.classList.remove('active');
                navHistory.classList.add('active');
                renderHistoryList();
            }
        }

        // 历史记录相关函数
        function loadHistory() {
            const data = localStorage.getItem(HISTORY_KEY);
            return data ? JSON.parse(data) : [];
        }

        function saveHistory(data) {
            localStorage.setItem(HISTORY_KEY, JSON.stringify(data));
        }

        // Modal 和 Toast 相关函数
        function openModal() {
            const modal = document.getElementById('archiveModal');
            if (modal) {
                modal.classList.add('active');
            }
        }

        function closeModal() {
            const modal = document.getElementById('archiveModal');
            if (modal) {
                modal.classList.remove('active');
            }
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            if (toast) {
                toast.textContent = message;
                toast.classList.add('active');
                setTimeout(() => {
                    toast.classList.remove('active');
                }, 2000);
            }
        }

        function archiveTasks() {
            const tasks = loadData();
            if (tasks.length === 0) {
                // alert('当前没有任务可以归档');
                showToast('当前没有任务可以归档');
                return;
            }

            // 打开自定义 Modal
            openModal();
        }

        function confirmArchive() {
            const tasks = loadData();

            // 计算完成率
            let totalSubtasks = 0;
            let completedSubtasks = 0;
            tasks.forEach(task => {
                task.subtasks.forEach(sub => {
                    totalSubtasks++;
                    if (sub.status === 'complete') completedSubtasks++;
                });
            });

            const archive = {
                id: generateId(),
                archivedAt: new Date().toISOString(),
                tasks: JSON.parse(JSON.stringify(tasks)),
                taskCount: tasks.length,
                totalSubtasks: totalSubtasks,
                completedSubtasks: completedSubtasks,
                completionRate: totalSubtasks > 0 ? Math.round((completedSubtasks / totalSubtasks) * 100) : 0
            };

            const history = loadHistory();
            history.unshift(archive);
            saveHistory(history);

            // 清空当前任务
            saveData([]);

            renderTaskList();
            updateTotalProgress();

            // 关闭弹窗并显示 Toast
            closeModal();
            showToast('归档成功！已开启新征程');
        }

        function deleteHistory(historyId) {
            // 直接删除，使用 Toast 提示
            const history = loadHistory();
            const index = history.findIndex(h => h.id === historyId);
            if (index !== -1) {
                history.splice(index, 1);
                saveHistory(history);
                renderHistoryList();
                showToast('历史记录已删除');
            }
        }

        function toggleHistory(historyId) {
            const card = document.querySelector(`.history-card[data-id="${historyId}"]`);
            if (card) {
                card.classList.toggle('expanded');
            }
        }

        function formatDateTime(isoString) {
            const date = new Date(isoString);
            const year = date.getFullYear();
            const month = date.getMonth() + 1;
            const day = date.getDate();
            const hour = date.getHours().toString().padStart(2, '0');
            const minute = date.getMinutes().toString().padStart(2, '0');
            return `${year}年${month}月${day}日 ${hour}:${minute}`;
        }

        function renderHistoryList() {
            const history = loadHistory();
            const container = document.getElementById('historyList');

            if (history.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <circle cx="12" cy="12" r="10"></circle>
                            <polyline points="12 6 12 12 16 14"></polyline>
                        </svg>
                        <h3>暂无历史记录</h3>
                        <p>归档的任务将保存在这里</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = history.map(record => `
                <div class="history-card" data-id="${record.id}">
                    <div class="history-header" onclick="toggleHistory('${record.id}')">
                        <div class="history-info">
                            <div class="history-date">📅 ${formatDateTime(record.archivedAt)}</div>
                            <div class="history-stats">
                                <span>📋 ${record.taskCount} 个任务</span>
                                <span>✅ 完成率 ${record.completionRate}%</span>
                                <span>📝 ${record.completedSubtasks}/${record.totalSubtasks} 子任务</span>
                            </div>
                        </div>
                        <div class="history-actions" onclick="event.stopPropagation()">
                            <button class="task-action-btn" onclick="toggleHistory('${record.id}')" title="展开/收起">
                                <svg class="expand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="6 9 12 15 18 9"></polyline>
                                </svg>
                            </button>
                            <button class="task-action-btn delete" onclick="deleteHistory('${record.id}')" title="删除">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="3 6 5 6 21 6"></polyline>
                                    <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="history-detail">
                        <div class="history-detail-content">
                            ${record.tasks.map(task => `
                                <div class="history-task-item">
                                    <div class="history-task-name">${task.name}</div>
                                    <div class="history-task-date">📅 ${formatDate(task.startDate)} - ${formatDate(task.endDate)}</div>
                                    ${task.subtasks.length > 0 ? `
                                        <div class="history-subtask-list">
                                            ${task.subtasks.map(sub => `
                                                <div class="history-subtask-item">
                                                    <div class="history-subtask-status ${sub.status}">
                                                        ${sub.status === 'complete' ? '✓' : sub.status === 'skipped' ? '✗' : '○'}
                                                    </div>
                                                    <span class="history-subtask-name ${sub.status}">${sub.name}</span>
                                                </div>
                                            `).join('')}
                                        </div>
                                    ` : '<div style="color: var(--text-muted); font-size: 0.8rem;">无子任务</div>'}
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function loadData() {
            const data = localStorage.getItem(STORAGE_KEY);
            return data ? JSON.parse(data) : [];
        }

        function saveData(data) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2);
        }

        function findTaskById(tasks, id) {
            return tasks.findIndex(task => task.id === id);
        }

        function findSubtaskById(subtasks, id) {
            return subtasks.findIndex(sub => sub.id === id);
        }

        function isTodayInRange(startDate, endDate) {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const start = new Date(startDate);
            start.setHours(0, 0, 0, 0);
            const end = new Date(endDate);
            end.setHours(0, 0, 0, 0);
            return today >= start && today <= end;
        }

        function getDaysRemaining(endDate) {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const end = new Date(endDate);
            end.setHours(0, 0, 0, 0);
            const diff = Math.ceil((end - today) / (1000 * 60 * 60 * 24));
            return diff;
        }

        function getTotalDays(startDate, endDate) {
            const start = new Date(startDate);
            start.setHours(0, 0, 0, 0);
            const end = new Date(endDate);
            end.setHours(0, 0, 0, 0);
            const diff = Math.ceil((end - start) / (1000 * 60 * 60 * 24)) + 1; // 包含首尾
            return diff;
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return `${date.getMonth() + 1}月${date.getDate()}日`;
        }

        function updateTotalProgress() {
            const tasks = loadData();
            let total = 0;
            let completed = 0;
            
            tasks.forEach(task => {
                task.subtasks.forEach(sub => {
                    total++;
                    if (sub.status === 'complete') completed++;
                });
            });

            const percent = total > 0 ? (completed / total) * 100 : 0;
            document.getElementById('totalProgress').textContent = `${completed} / ${total}`;
            document.getElementById('totalProgressBar').style.width = `${percent}%`;
        }

        function renderTaskList() {
            const tasks = loadData();
            const container = document.getElementById('taskList');

            if (tasks.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
                        </svg>
                        <h3>暂无学习任务</h3>
                        <p>创建你的第一个大任务，开始学习之旅吧</p>
                    </div>
                `;
                return;
            }

            const sortedTasks = [...tasks].sort((a, b) => new Date(a.startDate) - new Date(b.startDate));

            container.innerHTML = sortedTasks.map((task) => {
                const totalSubtasks = task.subtasks.length;
                const completedSubtasks = task.subtasks.filter(s => s.status === 'complete').length;
                const progressPercent = totalSubtasks > 0 ? (completedSubtasks / totalSubtasks) * 100 : 0;
                const isActive = isTodayInRange(task.startDate, task.endDate);

                return `
                    <div class="task-card ${isActive ? 'active' : ''}" data-id="${task.id}">
                        <div class="task-header" onclick="toggleTask('${task.id}')">
                            <div class="task-main">
                                <div class="task-name">${task.name}</div>
                                ${totalSubtasks > 0 ? `
                                    <div class="task-progress-section">
                                        <div class="task-progress-header">
                                            <span>子任务进度</span>
                                            <span>${completedSubtasks} / ${totalSubtasks}</span>
                                        </div>
                                        <div class="task-progress-bar">
                                            <div class="task-progress-fill" style="width: ${progressPercent}%"></div>
                                        </div>
                                    </div>
                                ` : ''}
                            </div>
                            <div class="task-actions" onclick="event.stopPropagation()">
                                <button class="task-action-btn" onclick="toggleTask('${task.id}')" title="展开/收起">
                                    <svg class="expand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <polyline points="6 9 12 15 18 9"></polyline>
                                    </svg>
                                </button>
                                <button class="task-action-btn" onclick="addSubtask('${task.id}')" title="添加子任务">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <line x1="12" y1="5" x2="12" y2="19"></line>
                                        <line x1="5" y1="12" x2="19" y2="12"></line>
                                    </svg>
                                </button>
                                <button class="task-action-btn delete" onclick="deleteTask('${task.id}')" title="删除任务">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <polyline points="3 6 5 6 21 6"></polyline>
                                        <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path>
                                        <line x1="10" y1="11" x2="10" y2="17"></line>
                                        <line x1="14" y1="11" x2="14" y2="17"></line>
                                    </svg>
                                </button>
                            </div>
                        </div>
                        <div class="subtask-section">
                            <div class="subtask-content">
                                <div class="subtask-list">
                                    ${task.subtasks.map((sub) => `
                                        <div class="subtask-item ${sub.status}">
                                            <div class="subtask-status ${sub.status}" onclick="cycleSubtaskStatus('${task.id}', '${sub.id}')">
                                                ${sub.status === 'complete' ? '✓' : sub.status === 'skipped' ? '✗' : '○'}
                                            </div>
                                            <span class="subtask-name">${sub.name}</span>
                                            <button class="subtask-delete" onclick="deleteSubtask('${task.id}', '${sub.id}')">
                                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                                    <line x1="18" y1="6" x2="6" y2="18"></line>
                                                    <line x1="6" y1="6" x2="18" y2="18"></line>
                                                </svg>
                                            </button>
                                        </div>
                                    `).join('')}
                                </div>
                                <div class="add-subtask">
                                    <div class="add-subtask-row">
                                        <input type="text" id="subtask-input-${task.id}" placeholder="添加子任务..." onkeypress="handleSubtaskKeypress(event, '${task.id}')">
                                        <button class="btn btn-secondary" onclick="addSubtask('${task.id}')">添加</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function toggleTask(taskId) {
            const taskCard = document.querySelector(`.task-card[data-id="${taskId}"]`);
            if (taskCard) {
                taskCard.classList.toggle('expanded');
            }
        }

        function toggleForm() {
            const form = document.getElementById('taskForm');
            if (form) {
                form.classList.toggle('hidden');
            }
        }

        function addTask() {
            const name = document.getElementById('taskName').value.trim();

            if (!name) {
                showToast('请输入任务名称');
                return;
            }

            // 从全局周期获取日期
            const globalPeriod = loadGlobalPeriod();
            if (!globalPeriod) {
                showToast('请先设置学习周期');
                return;
            }

            const tasks = loadData();
            tasks.push({
                id: generateId(),
                name,
                startDate: globalPeriod.startDate,
                endDate: globalPeriod.endDate,
                subtasks: []
            });
            saveData(tasks);

            document.getElementById('taskName').value = '';

            renderTaskList();
            updateTotalProgress();
            toggleForm();
        }

        function deleteTask(taskId) {
            // 直接删除，使用 Toast 提示
            const tasks = loadData();
            const index = findTaskById(tasks, taskId);
            if (index !== -1) {
                tasks.splice(index, 1);
                saveData(tasks);
                renderTaskList();
                updateTotalProgress();
                showToast('任务已删除');
            }
        }

        function addSubtask(taskId) {
            const input = document.getElementById(`subtask-input-${taskId}`);
            const name = input.value.trim();
            
            if (!name) {
                input.focus();
                return;
            }

            const tasks = loadData();
            const taskIndex = findTaskById(tasks, taskId);
            if (taskIndex !== -1) {
                tasks[taskIndex].subtasks.push({
                    id: generateId(),
                    name,
                    status: 'pending'
                });
                saveData(tasks);
                
                input.value = '';
                renderTaskList();
                updateTotalProgress();
                
                const taskCard = document.querySelector(`.task-card[data-id="${taskId}"]`);
                if (taskCard) {
                    taskCard.classList.add('expanded');
                }
            }
        }

        function handleSubtaskKeypress(event, taskId) {
            if (event.key === 'Enter') {
                addSubtask(taskId);
            }
        }

        function cycleSubtaskStatus(taskId, subtaskId) {
            const tasks = loadData();
            const taskIndex = findTaskById(tasks, taskId);
            if (taskIndex === -1) return;
            
            const subtaskIndex = findSubtaskById(tasks[taskIndex].subtasks, subtaskId);
            if (subtaskIndex === -1) return;
            
            const currentStatus = tasks[taskIndex].subtasks[subtaskIndex].status;
            
            if (currentStatus === 'pending') {
                tasks[taskIndex].subtasks[subtaskIndex].status = 'complete';
            } else if (currentStatus === 'complete') {
                tasks[taskIndex].subtasks[subtaskIndex].status = 'skipped';
            } else {
                tasks[taskIndex].subtasks[subtaskIndex].status = 'pending';
            }
            
            saveData(tasks);
            renderTaskList();
            updateTotalProgress();
            
            const taskCard = document.querySelector(`.task-card[data-id="${taskId}"]`);
            if (taskCard) {
                taskCard.classList.add('expanded');
            }
        }

        function deleteSubtask(taskId, subtaskId) {
            const tasks = loadData();
            const taskIndex = findTaskById(tasks, taskId);
            if (taskIndex === -1) return;
            
            const subtaskIndex = findSubtaskById(tasks[taskIndex].subtasks, subtaskId);
            if (subtaskIndex === -1) return;
            
            tasks[taskIndex].subtasks.splice(subtaskIndex, 1);
            saveData(tasks);
            renderTaskList();
            updateTotalProgress();
            
            const taskCard = document.querySelector(`.task-card[data-id="${taskId}"]`);
            if (taskCard) {
                taskCard.classList.add('expanded');
            }
        }

        // 全局周期相关函数
        const GLOBAL_PERIOD_KEY = 'study_plans_global_period';

        function loadGlobalPeriod() {
            const data = localStorage.getItem(GLOBAL_PERIOD_KEY);
            return data ? JSON.parse(data) : null;
        }

        function saveGlobalPeriodData(data) {
            localStorage.setItem(GLOBAL_PERIOD_KEY, JSON.stringify(data));
        }

        function toggleGlobalPeriodForm() {
            const form = document.getElementById('globalPeriodForm');
            if (form) {
                form.classList.toggle('active');
            }
        }

        function cancelGlobalPeriod() {
            const form = document.getElementById('globalPeriodForm');
            if (form) {
                form.classList.remove('active');
            }
        }

        function saveGlobalPeriod() {
            const startDate = document.getElementById('globalStartDate').value;
            const endDate = document.getElementById('globalEndDate').value;

            if (!startDate || !endDate) {
                showToast('请选择开始和结束日期');
                return;
            }

            if (new Date(endDate) < new Date(startDate)) {
                showToast('结束日期不能早于开始日期');
                return;
            }

            const existingPeriod = loadGlobalPeriod();
            saveGlobalPeriodData({
                startDate,
                endDate,
                difficulty: existingPeriod ? existingPeriod.difficulty : 2
            });
            toggleGlobalPeriodForm();
            renderGlobalPeriod();
            showToast('学习周期已设置');
        }

        function cycleDifficulty() {
            const period = loadGlobalPeriod();
            if (!period) {
                showToast('请先设置学习周期');
                return;
            }

            // 循环切换难度: 1 -> 2 -> 3 -> 4 -> 5 -> 1
            const currentDifficulty = period.difficulty || 2;
            const newDifficulty = currentDifficulty >= 5 ? 1 : currentDifficulty + 1;

            period.difficulty = newDifficulty;
            saveGlobalPeriodData(period);
            renderGlobalPeriod();
        }

        function renderGlobalPeriod() {
            const period = loadGlobalPeriod();
            const container = document.getElementById('globalPeriodContent');

            if (!period || !container) return;

            const daysRemaining = getDaysRemaining(period.endDate);
            let countdownText, countdownClass;

            if (daysRemaining < 0) {
                countdownText = `⚠️ 已逾期 ${Math.abs(daysRemaining)} 天`;
                countdownClass = 'overdue';
            } else if (daysRemaining === 0) {
                countdownText = `⏰ 今日截止`;
                countdownClass = 'warning';
            } else if (daysRemaining <= 3) {
                countdownText = `⏳ 剩余 ${daysRemaining} 天`;
                countdownClass = 'warning';
            } else {
                countdownText = `⏳ 剩余 ${daysRemaining} 天`;
                countdownClass = 'normal';
            }

            // 难度等级配置
            const difficultyLevels = {
                1: { text: '拉完了', icon: '🎮' },
                2: { text: 'npc', icon: '⚔️' },
                3: { text: '人上人', icon: '👑' },
                4: { text: '顶级', icon: '🔥' },
                5: { text: '夯', icon: '💀' }
            };
            const difficulty = period.difficulty || 2;
            const difficultyInfo = difficultyLevels[difficulty];

            container.innerHTML = `
                <div class="global-period-content">
                    <div class="global-period-row global-period-row-top">
                        <button class="difficulty-badge difficulty-level-${difficulty}" onclick="cycleDifficulty()" title="点击切换难度">
                            ${difficultyInfo.icon} ${difficultyInfo.text}
                        </button>
                        <button class="global-period-edit-btn" onclick="toggleGlobalPeriodForm()">设置</button>
                    </div>
                    <div class="global-period-row global-period-row-bottom">
                        <div class="global-period-dates">
                            <span class="global-period-dates-text">${formatDate(period.startDate)} — ${formatDate(period.endDate)}</span>
                        </div>
                        <span class="global-countdown ${countdownClass}">${countdownText}</span>
                    </div>
                </div>
            `;

            // 更新表单中的值
            document.getElementById('globalStartDate').value = period.startDate;
            document.getElementById('globalEndDate').value = period.endDate;
        }

        // 日期限制相关函数
        function getTodayString() {
            const today = new Date();
            const year = today.getFullYear();
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const day = String(today.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function initDateConstraints() {
            const today = getTodayString();

            // 全局周期日期输入
            const globalStartDate = document.getElementById('globalStartDate');
            const globalEndDate = document.getElementById('globalEndDate');

            if (globalStartDate) {
                globalStartDate.min = today;
                globalStartDate.addEventListener('change', function() {
                    if (globalEndDate) {
                        globalEndDate.min = this.value;
                        if (globalEndDate.value && globalEndDate.value < this.value) {
                            globalEndDate.value = this.value;
                        }
                    }
                });
            }

            if (globalEndDate) {
                globalEndDate.min = today;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderTaskList();
            updateTotalProgress();
            const form = document.getElementById('taskForm');
            if (form) {
                form.classList.add('hidden');
            }
            // 随机显示励志语录
            setMotivationalQuote();
            // 渲染全局周期
            renderGlobalPeriod();
            // 初始化日期限制
            initDateConstraints();
        });

        // 励志语录数组
        const motivationalQuotes = [
            '种一棵树最好的时间是十年前，其次是现在。',
            '流水不争先，争的是滔滔不绝。',
            '不要假装很努力，结果不会陪你演戏。',
            '星光不问赶路人，时光不负有心人。',
            '慢慢来，比较快。',
            '把热爱的事情做到极致，便成了价值。',
            '当你觉得为时已晚的时候，恰恰是最早的时候。',
            '每一次努力，都是对未来的积累。',
            '坚持不下去的时候，再坚持一下。',
            '今天的选择，决定明天的你。'
        ];

        // 随机设置励志语录
        function setMotivationalQuote() {
            const quoteElement = document.getElementById('motivational-quote');
            if (quoteElement) {
                const randomIndex = Math.floor(Math.random() * motivationalQuotes.length);
                quoteElement.textContent = motivationalQuotes[randomIndex];
            }
        }
    </script>
</body>
</html>
